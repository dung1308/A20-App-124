<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác thực | VinUni Admission Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Design Tokens from DESIGN.md */
            --background: #f8f9ff;
            --on-background: #0d1c2e;
            --primary: #003466; /* Trustworthy Blue */
            --on-primary: #ffffff;
            --surface: #ffffff;
            --outline: #737781;
            --outline-variant: #E2E8F0;
            --surface-container: #F1F5F9;
            --on-surface-variant: #424750;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            color: var(--on-background);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .auth-card {
            background: var(--surface);
            border: 1px solid var(--outline-variant);
            border-radius: 1rem; /* Rounded Level 2 for containers */
            padding: 48px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 4px 20px rgba(13, 28, 46, 0.05); /* Ambient Shadow */
        }

        h2 {
            font-size: 30px; /* h2 from DESIGN.md */
            font-weight: 600;
            line-height: 1.3;
            letter-spacing: -0.01em;
            margin: 0 0 8px 0;
            text-align: center;
        }

        .subtitle {
            font-size: 16px; /* body-md from DESIGN.md */
            color: var(--on-surface-variant);
            text-align: center;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px; /* label-md from DESIGN.md */
            font-weight: 500;
            line-height: 1.2;
            letter-spacing: 0.01em;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            box-sizing: border-box;
            background-color: var(--surface-container); /* Recessed background */
            border: 1px solid var(--outline);
            border-radius: 0.5rem; /* Rounded Level 2 for inputs */
            font-size: 16px;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            background-color: var(--surface);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 52, 102, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: var(--on-primary);
            border: none;
            border-radius: 0.5rem;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 12px;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .switch-auth {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--on-surface-variant);
        }

        .switch-auth span {
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            margin-left: 4px;
        }

        .switch-auth span:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-card" id="login-form">
        <h2>Chào mừng trở lại</h2>
        <p class="subtitle">Vui lòng đăng nhập để tiếp tục hành trình của bạn.</p>
        <form onsubmit="handleAuth(event, 'login')">
            <div class="form-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" placeholder="student@vinuni.edu.vn" required>
            </div>
            <div class="form-group">
                <label for="login-password">Mật khẩu</label>
                <input type="password" id="login-password" required>
            </div>
            <button type="submit" class="btn-primary">Đăng nhập</button>
        </form>
        <div class="switch-auth">
            Chưa có tài khoản? <span onclick="toggleAuth()">Đăng ký ngay</span>
        </div>
    </div>

    <div class="auth-card hidden" id="signup-form">
        <h2>Tạo tài khoản</h2>
        <p class="subtitle">Bắt đầu quá trình xét tuyển cùng AI Mentor.</p>
        <form onsubmit="handleAuth(event, 'signup')">
            <div class="form-group">
                <label for="signup-name">Họ và tên</label>
                <input type="text" id="signup-name" placeholder="Nguyễn Văn A" required>
            </div>
            <div class="form-group">
                <label for="signup-email">Email</label>
                <input type="email" id="signup-email" placeholder="student@vinuni.edu.vn" required>
            </div>
            <div class="form-group">
                <label for="signup-password">Mật khẩu</label>
                <input type="password" id="signup-password" required>
            </div>
            <button type="submit" class="btn-primary">Đăng ký</button>
        </form>
        <div class="switch-auth">
            Đã có tài khoản? <span onclick="toggleAuth()">Đăng nhập</span>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';

        function toggleAuth() {
            document.getElementById('login-form').classList.toggle('hidden');
            document.getElementById('signup-form').classList.toggle('hidden');
        }

        async function handleAuth(event, type) {
            event.preventDefault();
            const form = event.target;
            const endpoint = type === 'login' ? '/api/auth/login' : '/api/auth/signup';
            
            let payload = {};
            if (type === 'login') {
                payload = {
                    email: form.querySelector('input[type="email"]').value,
                    password: form.querySelector('input[type="password"]').value
                };
            } else {
                payload = {
                    full_name: form.querySelector('input[type="text"]').value,
                    email: form.querySelector('input[type="email"]').value,
                    password: form.querySelector('input[type="password"]').value
                };
            }

            try {
                const response = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (result.status === 'success') {
                    alert(result.message || 'Thao tác thành công!');
                    if (type === 'login') window.location.href = '/wizard';
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Có lỗi xảy ra khi kết nối đến server.');
            }
        }
    </script>
</body>
</html>
